<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #1e293b; } /* dark blue */
      .foreground { fill: #f8fafc; } /* white */
      .accent { fill: #3b82f6; } /* blue */
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #f8fafc; } /* white */
      .foreground { fill: #1e293b; } /* dark blue */
      .accent { fill: #3b82f6; } /* blue */
    }
  </style>
  <rect class="background" width="180" height="180" rx="24" />

  <!-- Delivery Truck -->
  <g class="foreground">
    <!-- Truck cabin -->
    <rect x="20" y="80" width="60" height="40" rx="8" />
    <!-- Truck bed -->
    <rect x="20" y="60" width="140" height="20" rx="4" />
    <!-- Wheels -->
    <circle cx="40" cy="130" r="16" class="accent" />
    <circle cx="120" cy="130" r="16" class="accent" />
    <!-- Window -->
    <rect x="30" y="90" width="20" height="20" rx="4" fill="currentColor" />
    <!-- Door -->
    <rect x="55" y="90" width="20" height="20" rx="4" fill="currentColor" />
    <!-- Star on door -->
    <polygon points="65,95 67,90 70,90 68,93 70,96 65,101 60,96 62,93 60,90 63,90" fill="currentColor" />
  </g>

  <!-- Dashboard chart element -->
  <g class="foreground" opacity="0.8">
    <rect x="80" y="40" width="60" height="40" rx="6" />
    <rect x="85" y="45" width="10" height="30" rx="2" />
    <rect x="100" y="50" width="10" height="20" rx="2" />
    <rect x="115" y="55" width="10" height="15" rx="2" />
  </g>
</svg>