<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #1e293b; }
      .foreground { fill: #f8fafc; }
      .accent { fill: #3b82f6; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #f8fafc; }
      .foreground { fill: #1e293b; }
      .accent { fill: #3b82f6; }
    }
  </style>
  <rect width="16" height="16" rx="2" class="background"/>
  <!-- Simple truck silhouette -->
  <rect x="2" y="8" width="6" height="3" rx="1" class="foreground"/>
  <rect x="2" y="6" width="12" height="2" rx="1" class="foreground"/>
  <circle cx="4" cy="11" r="1.5" class="accent"/>
  <circle cx="10" cy="11" r="1.5" class="accent"/>
</svg>